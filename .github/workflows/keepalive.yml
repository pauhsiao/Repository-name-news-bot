name: keepalive
on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:
jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: update keepalive timestamp
        run: |
          echo "last keepalive: $(date -u '+%Y-%m-%d %H:%M UTC')" > keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keepalive.txt
          git commit -m "chore: keepalive $(date -u '+%Y-%m-%d')"
          git push
